<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Draw Duel</title>
  <link rel="stylesheet" href="carddraw-style.css">
</head>
<body>

  <h1 id="result">Refresh to Draw!</h1>

  <div class="players-container">

    <div class="player">
      <h2>Player 1</h2>
      <img src="images/card1.png" alt="Player 1 card" id="player1-card">
    </div>

    <div class="player">
      <h2>Player 2</h2>
      <img src="images/card1.png" alt="Player 2 card" id="player2-card">
    </div>
  </div>

  <button id="draw-button">Draw Again</button>

  <p>Scores <span id="player1-score">0</span> - <span id="player2-score">0</span></p>

  <script src="carddraw-script.js"></script>
</body>
</html>
